apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.otel.inject }}
        # Triggers the OTel Operator mutating webhook to inject the Node.js SDK
        instrumentation.opentelemetry.io/inject-nodejs: "true"
        {{- end }}
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # Minimal HTTP server — the OTel Operator wraps it via NODE_OPTIONS at runtime
        command:
          - node
          - -e
          - |
            const http = require('http');
            http.createServer((req, res) => {
              console.log(req.method, req.url);
              res.writeHead(200, { 'Content-Type': 'application/json' });
              res.end(JSON.stringify({ status: 'ok', path: req.url, ts: new Date().toISOString() }));
            }).listen(3000, () => console.log('listening on :3000'));
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "app.fullname" . }}
      {{- end }}
