## Tempo values for EKS
## Chart: grafana/tempo

tempo:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  retention: 24h

  # Receivers — accepts OTLP from the OTEL Collector
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

persistence:
  enabled: true
  storageClassName: gp3
  size: 20Gi

serviceMonitor:
  enabled: true
