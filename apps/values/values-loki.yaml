## Loki values for EKS
## Chart: grafana/loki
## Deployed in "SingleBinary" mode (all components in one pod) — suitable for dev/staging.
## For production, switch deploymentMode to SimpleScalable or Distributed.

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: gp3
    size: 20Gi

# Disable components not needed in SingleBinary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable self-monitoring and Grafana agent to keep it lightweight
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
