name: Terraform Deployment

on:
  push:
    branches:
      - main

# Um único apply por vez. Compartilhado com tf-destroy.yml para que deploy e
# destroy nunca rodem simultaneamente no mesmo branch.
# cancel-in-progress: false → fila; nunca interrompe um apply no meio.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  infra:
    name: Terraform Deployment - Infra
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.export.outputs.cluster_name }}
      cluster_endpoint: ${{ steps.export.outputs.cluster_endpoint }}
      cluster_ca: ${{ steps.export.outputs.cluster_ca }}
      alb_irsa_role: ${{ steps.export.outputs.alb_irsa_role }}
    permissions:
      contents: read
      id-token: write
      issues: write    
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ./infra

        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export Outputs
        id: export
        working-directory: infra
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
          echo "cluster_ca=$(terraform output -raw cluster_ca)" >> $GITHUB_OUTPUT
          echo "alb_irsa_role=$(terraform output -raw alb_irsa_role)" >> $GITHUB_OUTPUT

  apps:
    name: Terraform Deployment - Apps
    runs-on: ubuntu-latest
    needs: infra
    permissions:
      contents: read
      id-token: write
      issues: write    
    defaults:
      run:
        working-directory: apps
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform-apps.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_cluster_name: ${{ needs.infra.outputs.cluster_name }}
          TF_VAR_kube_host: ${{ needs.infra.outputs.cluster_endpoint }}
          TF_VAR_kube_ca: ${{ needs.infra.outputs.cluster_ca }}
          TF_VAR_alb_irsa_role: ${{ needs.infra.outputs.alb_irsa_role }}
        continue-on-error: false

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_cluster_name: ${{ needs.infra.outputs.cluster_name }}
          TF_VAR_kube_host: ${{ needs.infra.outputs.cluster_endpoint }}
          TF_VAR_kube_ca: ${{ needs.infra.outputs.cluster_ca }}
          TF_VAR_alb_irsa_role: ${{ needs.infra.outputs.alb_irsa_role }}
