name: Terraform Destroy

on:
  workflow_dispatch:

# Mesmo grupo do tf-deploy.yml — impede que destroy e deploy rodem ao mesmo tempo.
# cancel-in-progress: false → nunca cancela um destroy em andamento.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy-apps:
    name: Terraform Destroy - Apps
    runs-on: ubuntu-latest
    outputs:
      cluster_name:     ${{ steps.cluster.outputs.cluster_name }}
      cluster_endpoint: ${{ steps.cluster.outputs.cluster_endpoint }}
      cluster_ca:       ${{ steps.cluster.outputs.cluster_ca }}
    defaults:
      run:
        working-directory: apps
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # Initialize infra-cluster to read its state outputs — needed to configure
      # the Helm provider in the apps layer and to pass forward to destroy-infra-resources.
      - name: Terraform Init - Infra Cluster (read outputs)
        working-directory: infra-cluster
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=infra-cluster/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Export Infra-Cluster Outputs
        id: cluster
        working-directory: infra-cluster
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)"         >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
          echo "cluster_ca=$(terraform output -raw cluster_ca)"             >> $GITHUB_OUTPUT
          echo "alb_irsa_role=$(terraform output -raw alb_irsa_role)"       >> $GITHUB_OUTPUT

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-2 \
            --name ${{ steps.cluster.outputs.cluster_name }}

      # Delete Ingress resources while the ALB Controller is still running.
      # The controller watches Ingress deletions to deprovision the AWS ALB and
      # its associated security group. If the controller pod is removed first,
      # both the ALB and its SG are left orphaned — the SG blocks VPC deletion.
      - name: Delete Ingress resources and wait for ALB deprovisioning
        run: |
          kubectl delete ingress --all --all-namespaces --ignore-not-found

          # Poll until no ALBs tagged by this cluster remain in AWS.
          # This is more reliable than a fixed sleep.
          CLUSTER="${{ steps.cluster.outputs.cluster_name }}"
          echo "Waiting for ALBs tagged kubernetes.io/cluster/$CLUSTER to be deleted..."
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region us-east-2 \
              --query "LoadBalancers[?contains(LoadBalancerName, '${CLUSTER}') || \
                Tags[?Key=='kubernetes.io/cluster/${CLUSTER}']].LoadBalancerArn" \
              --output text 2>/dev/null | wc -w)
            if [ "$COUNT" -eq 0 ]; then
              echo "All ALBs deprovisioned."
              break
            fi
            echo "  $COUNT ALB(s) still present, waiting 10s... ($i/24)"
            sleep 10
          done

          # Safety net: delete any security groups the ALB controller created
          # but did not clean up (tagged elbv2.k8s.aws/cluster=<cluster>).
          SG_IDS=$(aws ec2 describe-security-groups --region us-east-2 \
            --filters "Name=tag:elbv2.k8s.aws/cluster,Values=$CLUSTER" \
            --query 'SecurityGroups[*].GroupId' --output text)
          if [ -n "$SG_IDS" ]; then
            echo "Deleting residual ALB security groups: $SG_IDS"
            for sg in $SG_IDS; do
              aws ec2 delete-security-group --region us-east-2 --group-id "$sg" || true
            done
          fi

      # kube-prometheus-stack removes the Prometheus Operator before its CRD
      # instances (ServiceMonitor, PrometheusRule, etc.). With the operator gone,
      # nothing processes the monitoring.coreos.com finalizers, leaving those
      # resources stuck in Terminating and blocking the Helm release deletion.
      # Stripping finalizers here lets Kubernetes garbage-collect them normally.
      - name: Remove Prometheus Operator finalizers
        run: |
          for crd in prometheuses alertmanagers prometheusrules servicemonitors \
                     podmonitors thanosrulers probes prometheusagents scrapeconfigs; do
            kubectl get "$crd" --all-namespaces --ignore-not-found -o json \
              | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' \
              | while read -r ns name; do
                  kubectl patch "$crd" "$name" -n "$ns" \
                    --type=merge -p '{"metadata":{"finalizers":null}}' || true
                done
          done

      - name: Terraform Init - Apps
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform-apps.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy - Apps
        run: terraform destroy -auto-approve
        env:
          TF_VAR_cluster_name:  ${{ steps.cluster.outputs.cluster_name }}
          TF_VAR_kube_host:     ${{ steps.cluster.outputs.cluster_endpoint }}
          TF_VAR_kube_ca:       ${{ steps.cluster.outputs.cluster_ca }}
          TF_VAR_alb_irsa_role: ${{ steps.cluster.outputs.alb_irsa_role }}

  destroy-infra-resources:
    name: Terraform Destroy - Infra Resources
    runs-on: ubuntu-latest
    needs: destroy-apps
    defaults:
      run:
        working-directory: infra-resources
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=infra-resources/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy - Infra Resources
        run: terraform destroy -auto-approve
        env:
          TF_VAR_cluster_name: ${{ needs.destroy-apps.outputs.cluster_name }}
          TF_VAR_kube_host:    ${{ needs.destroy-apps.outputs.cluster_endpoint }}
          TF_VAR_kube_ca:      ${{ needs.destroy-apps.outputs.cluster_ca }}

  destroy-infra-cluster:
    name: Terraform Destroy - Infra Cluster
    runs-on: ubuntu-latest
    needs: destroy-infra-resources
    defaults:
      run:
        working-directory: infra-cluster
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=infra-cluster/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy - Infra Cluster
        run: terraform destroy -auto-approve
